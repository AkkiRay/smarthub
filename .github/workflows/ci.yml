# SmartHome Hub — CI pipeline.
#
# Триггерится на каждый push в main и на любой PR. Прогон в порядке:
#   1. quality (prettier --check + vue-tsc + tsc по всему монорепо).
#   2. matrix build (ubuntu / windows / macos) — собирает packaged-артефакт
#      без публикации. Артефакты загружаются в GH Actions для skim-проверки.
#
# Не публикует ничего — релизы только из release.yml по тегам v*.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm format:check
      - name: Typecheck
        run: pnpm typecheck

  # macOS из matrix исключён — см. комментарий в release.yml.
  build:
    name: Build (${{ matrix.os }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (no publish)
        env:
          # CSC_IDENTITY_AUTO_DISCOVERY=false — отключаем поиск keychain-сертификатов
          # на CI, иначе electron-builder падает на macOS, не найдя identity.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)  pnpm build:linux ;;
            windows-latest) pnpm build:win ;;
            macos-latest)   pnpm build:mac ;;
          esac
      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: smarthub-${{ matrix.os }}-${{ github.sha }}
          path: |
            apps/desktop/release/**/*.exe
            apps/desktop/release/**/*.dmg
            apps/desktop/release/**/*.zip
            apps/desktop/release/**/*.AppImage
            apps/desktop/release/**/*.deb
            apps/desktop/release/**/*.yml
            apps/desktop/release/**/*.blockmap
          if-no-files-found: warn
          retention-days: 7
