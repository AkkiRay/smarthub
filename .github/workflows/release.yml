# SmartHome Hub — Release pipeline.
#
# Сценарии запуска:
#   1. Push тега `v*.*.*` (например, `v1.2.3`) — production-релиз.
#   2. workflow_dispatch с input `version` — ручной релиз: создаёт коммит
#      bump'ом версии и тег v<version>, далее ОДНИМ workflow runem build+publish.
#
# Поток:
#   - quality (prettier + typecheck) на ubuntu — fail-fast перед сборкой.
#   - prepare (только для workflow_dispatch) — bump версии + tag-push,
#     ИДЕМПОТЕНТНО (rerun не падает, если коммит/тег уже есть).
#   - release (build-matrix linux / windows) собирает и публикует артефакт
#     в DRAFT release на GitHub. Имя релиза совпадает с тегом. electron-builder
#     создаёт `latest.yml` / `latest-mac.yml` / `latest-linux.yml` — они
#     нужны electron-updater'у в рантайме для discovery новых версий.
#   - publish (отдельный job) снимает draft-флаг — релиз становится виден
#     пользователям и попадает в latest GH Releases feed.
#
# Архитектурное замечание: prepare НЕ полагается на secondary workflow trigger
# по push-тегу, потому что push'ы через GITHUB_TOKEN не вызывают каскадные
# workflows (anti-recursion). Поэтому build идёт в этом же run'е сразу после
# prepare, через `needs: [quality, prepare]` + checkout по созданному tag-SHA.
#
# Secrets:
#   - GITHUB_TOKEN — выдаётся автоматически, права contents:write для draft+publish.
#   - WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD — для подписания Windows билдов
#     (опционально; без них билд unsigned, auto-update всё равно работает).
#   - MAC_CSC_LINK / MAC_CSC_KEY_PASSWORD / APPLE_ID /
#     APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID — для подписи и notarization
#     macOS (опционально).
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия релиза (без префикса v, напр. 1.2.3). Создаст коммит + тег + draft + опубликует."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Format & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck

  # workflow_dispatch only: bump версий, commit, tag, push.
  # Идемпотентно — rerun не падает: skip bump'а если версия уже совпадает,
  # skip git tag если тег уже существует.
  prepare:
    name: Prepare release tag
    needs: quality
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - id: bump
        name: Bump version, commit and tag (idempotent)
        shell: bash
        run: |
          set -euxo pipefail
          v="${{ inputs.version }}"
          tag="v${v}"

          # Bump версии только если она реально отличается — иначе git commit
          # упадёт с «nothing to commit».
          current=$(node -p "require('./package.json').version")
          if [ "$current" != "$v" ]; then
            node -e "const f='package.json';const p=require('./'+f);p.version='${v}';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
            node -e "const f='apps/desktop/package.json';const p=require('./'+f);p.version='${v}';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
            git add package.json apps/desktop/package.json
            git commit -m "chore: release ${tag}"
            git push origin HEAD
          else
            echo "Version already at ${v}, skipping bump commit."
          fi

          # Tag создаём только если его ещё нет — иначе `git tag` падает
          # exit code 128. Сначала локально, потом на remote отдельно: если
          # локально нет, но на remote есть (race / partial rerun) — fetch
          # сначала покажет это.
          git fetch origin --tags --quiet || true
          if git rev-parse --quiet --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally, skipping create."
          elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on remote, fetching."
            git fetch origin "refs/tags/${tag}:refs/tags/${tag}"
          else
            git tag "${tag}"
            git push origin "${tag}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  # macOS из matrix исключён намеренно — целевая аудитория хаба под Windows/Linux,
  # cross-compile под darwin без Apple Developer Program сейчас не приоритет.
  # Если когда-то понадобится — добавьте `macos-latest` обратно и заведите
  # MAC_CSC_LINK / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID.
  release:
    name: Build & publish (${{ matrix.os }})
    needs: [quality, prepare]
    # `always()` — позволяет run'ить даже когда prepare skipped (push-event).
    # Условие: quality прошёл И (это push-event ИЛИ prepare прошёл).
    if: |
      always() && needs.quality.result == 'success' && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && needs.prepare.result == 'success')
      )
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Для dispatch checkout-имся по созданному тегу — иначе билд пойдёт
          # на старом HEAD без bump'а версии. Для push GITHUB_REF уже = тег.
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.prepare.outputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish — Linux
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:linux

      - name: Build & publish — Windows
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm release:win

  # `if: !cancelled()` — promote выполняется даже если одна из платформ
  # в matrix упала: Linux + Windows достаточно для valid release, mac можно
  # дорелизнуть позже отдельным тегом. release-edit идемпотентен.
  publish:
    name: Promote draft → published
    needs: [release, prepare]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Promote release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          # Выбор tag'а зависит от события: для dispatch берём output из prepare,
          # для push — из GITHUB_REF.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ needs.prepare.outputs.tag }}"
          else
            tag="${GITHUB_REF##*/}"
          fi
          gh release edit "$tag" \
            --draft=false \
            --latest \
            --repo "$GITHUB_REPOSITORY"
